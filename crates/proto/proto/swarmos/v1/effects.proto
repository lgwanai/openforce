syntax = "proto3";
package swarmos.v1;

import "swarmos/v1/common.proto";

service EffectGateway {
  rpc RequestEffect(RequestEffectRequest) returns (RequestEffectResponse);
  rpc GetEffect(GetEffectRequest) returns (GetEffectResponse);
  rpc ApproveEffect(ApproveEffectRequest) returns (ApproveEffectResponse);
}

message RequestEffectRequest {
  Command command = 1;
  string effect_type = 2;
  string target = 3;
  string idempotency_key = 4;
  string payload_ref = 5;
}

message RequestEffectResponse {
  string effect_id = 1;
  string status = 2;
}

message GetEffectRequest {
  string effect_id = 1;
}

message GetEffectResponse {
  string effect_id = 1;
  string status = 2;
  string idempotency_key = 3;
}

message ApproveEffectRequest {
  string effect_id = 1;
  string approved_by = 2;
  string reason = 3;
}

message ApproveEffectResponse {
  string effect_id = 1;
  string status = 2;
}
